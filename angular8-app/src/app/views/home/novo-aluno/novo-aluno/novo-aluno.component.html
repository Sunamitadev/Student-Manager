<div class="page">

  <div class="form-card">

    <!-- HEADER -->
    <div class="header">
      <button class="back-btn" (click)="cancelar()">←</button>
      <h2 *ngIf="!isEditando">Novo Aluno</h2>
      <h2 *ngIf="isEditando">Editar Aluno</h2>
    </div>

    <!-- FOTO -->
    <div class="foto-section">
  <label>Foto do Aluno</label>

  <div class="foto-container">

    <!-- PREVIEW -->
    <div class="foto-preview">
      <img *ngIf="previewUrl" [src]="previewUrl" alt="Foto" />
      <span *ngIf="!previewUrl">Nenhuma foto</span>
    </div>

    <!-- INPUT OCULTO -->
    <input
      type="file"
      accept="image/*"
      (change)="onSelecionarFoto($event)"
      #fileInput
      hidden
    />

    <!-- BOTÃO -->
    <button
      type="button"
      class="btn-foto"
      (click)="fileInput.click()"
    >
      <i class="fas fa-camera"></i>
      Escolher Foto
    </button>

  </div>
</div>

    <!-- NOME -->
    <div class="form-group">
      <label>Nome Completo</label>
      <div class="input-icon">
        <i class="fas fa-user"></i>
        <input
          [disabled]="isEditando"
          [(ngModel)]="nome"
          name="nome"
          placeholder="Digite o nome do aluno"
        >
      </div>
    </div>

    <!-- EMAIL -->
    <div class="form-group">
      <label>Email</label>
      <div class="input-icon">
        <i class="fas fa-envelope"></i>
        <input
          [(ngModel)]="email"
          name="email"
          placeholder="aluno@email.com"
        >
      </div>
    </div>

    <!-- CPF -->
    <div class="form-group">
      <label>CPF</label>
      <div class="input-icon">
        <i class="fas fa-id-card"></i>
        <input
          [disabled]="isEditando"
          [(ngModel)]="cpf"
          name="cpf"
          placeholder="000.000.000-00"
          maxlength="14"
          (input)="formatarCpf()"
        >
      </div>
    </div>

    <!-- TELEFONE -->
    <div class="form-group">
      <label>Telefone</label>
      <div class="input-icon">
        <i class="fas fa-phone"></i>
        <input
          [(ngModel)]="telefone"
          name="telefone"
          placeholder="(00) 00000-0000"
          maxlength="15"
          (input)="formatarTelefone()"
        >
      </div>
    </div>

    <ng-container *ngIf="isEditando">
        <div class="status-wrapper">
        <label class="titulo-status">Status</label>

        <div class="status-opcoes">
            <label class="status-item">
            <input type="radio" name="status" [(ngModel)]="status" value="ativo">
            <span class="custom-radio ativo"></span>
            Ativo
            </label>

            <span class="divider"></span>

            <label class="status-item">
            <input type="radio" name="status" [(ngModel)]="status" value="inativo">
            <span class="custom-radio inativo"></span>
            Inativo
            </label>
        </div>
        </div>
    </ng-container>

    <!-- BOTÕES -->
    <div class="buttons">
      <button type="button" class="btn-cancel" (click)="cancelar()">
        Cancelar
      </button>

      <button type="button" class="btn-save" 
      *ngIf="!isEditando"
      [disabled]="!formularioValido()"
      [ngClass]="{'btn-disabled': !formularioValido()}"
      (click)="cadastrar()">
        Cadastrar
      </button>

      
      <button type="button" class="btn-save" 
      *ngIf="isEditando"
      [disabled]="!formularioValido()"
      [ngClass]="{'btn-disabled': !formularioValido()}"
      (click)="atualizar()">
        Salvar
      </button>
    </div>

  </div>
</div>
