<div class="page">

  <div class="form-card">

    <div class="header">
      <button class="back-btn" (click)="voltar()">←</button>
      <h2>Detalhes do Aluno</h2>
    </div>

    <div class="foto-preview">
      <img
        *ngIf="aluno.foto"
        [src]="'http://localhost:8080/uploads/' + aluno.foto"
      />
    </div>

    <div class="form-group">
      <label>Nome Completo</label>
      <input [value]="aluno?.nome" disabled>
    </div>

    <div class="form-group">
      <label>CPF</label>
      <input [value]="aluno?.cpf" disabled>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input [value]="aluno?.email" disabled>
    </div>

    <div class="form-group">
      <label>Telefone</label>
      <input [value]="aluno?.telefone" disabled>
    </div>

    <div class="form-group">
      <label>Matrícula</label>
      <input [value]="aluno?.matricula" disabled>
    </div>

    <div class="form-group">
      <label>Status</label>
      <div class="status">
        <span
          [ngClass]="{
            'ativo': aluno?.status === 'ATIVO',
            'inativo': aluno?.status === 'INATIVO'
          }"
        >
          ● {{ aluno?.status }}
        </span>
      </div>
    </div>

    <button class="btn-voltar" (click)="voltar()">
      Voltar
    </button>

  </div>

</div>
